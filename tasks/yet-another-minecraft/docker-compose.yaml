services:
  yet-another-minecraft:
    image: itzg/minecraft-server:stable-java25
    stdin_open: true
    ports:
      - target: 25565
        published: 25567
        protocol: tcp
        mode: host
    networks:
      - ctf-services-net
    security_opt:
      - no-new-privileges:true
    deploy:
      restart_policy:
        condition: on-failure
      resources:
        limits:
          cpus: "2"
          memory: 4G
    environment:
      EULA: "TRUE"
      TYPE: "PAPER"
      VERSION: "1.21.6"
      MEMORY: "3G"
      ENABLE_COMMAND_BLOCK: "true"
      FUNCTION_PERMISSION_LEVEL: "4"
      OP_PERMISSION_LEVEL: "4"
      COPY_CONFIG_DEST: "/data"
      SYNC_SKIP_NEWER_IN_DESTINATION: "false"
      ONLINE_MODE: "false"
      ENFORCE_SECURE_PROFILE: "false"
      DIFFICULTY: "normal"
      GAMEMODE: "adventure"
      FORCE_GAMEMODE: "true"
      MOTD: "yet another minecraft"
      VIEW_DISTANCE: "8"
      SIMULATION_DISTANCE: "6"
      SPAWN_PROTECTION: "0"
      LEVEL_TYPE: "flat"
      RCON_CMDS_STARTUP: |-
        gamerule doMobSpawning false
        gamerule commandBlockOutput false
        setworldspawn 0 64 0 0

        fill -26 63 -26 -16 115 26 minecraft:bedrock
        fill -15 63 -26 -5 115 26 minecraft:bedrock
        fill -4 63 -26 6 115 26 minecraft:bedrock
        fill 7 63 -26 17 115 26 minecraft:bedrock
        fill 18 63 -26 26 115 26 minecraft:bedrock

        fill -1 64 -1 1 66 1 minecraft:air

        setblock 0 65 1 minecraft:command_block{Command:"say Po co klikasz? hack4KrakCTF{nie_da_sie_teleportowac}",CustomName:'Kostka'} replace
        setblock 0 65 0 minecraft:oak_button[face=wall,facing=north] replace
    configs:
      - source: bukkit
        target: /config/bukkit.yml

configs:
  bukkit:
    file: ./bukkit.yml

networks:
  ctf-services-net:
    external: true
    name: bridge
