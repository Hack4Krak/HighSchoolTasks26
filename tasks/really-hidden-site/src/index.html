<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>SSL TERMINAL</title>
    <link rel="stylesheet" href="style.css"/>
</head>
<body>
    <main class="screen">
        <header class="top-bar">
            <div class="logo">KOMPLETNIE NIEPODEJRZANA STRONA</div>
            <div class="status">
                <span class="dot"></span>
                <span class="label">ONLINE</span>
            </div>
        </header>

        <section class="terminal">
            <div class="terminal-header">
                <span>root@ssl-cert</span>
                <span class="path">~/vault</span>
            </div>
            <div class="terminal-body" id="terminalBody">
                <p class="line">Initializing secure handshake...</p>
                <p class="line">Verifying certificate chain...</p>
                <p class="line">Session OK. Ready for command.</p>
            </div>
        </section>

        <section class="controls">
            <button id="fetchBtn" class="btn">Retrieve Flag</button>
            <button id="glitchBtn" class="btn secondary">Scan</button>
        </section>

        <section class="flag-panel">
            <div class="flag-label">FLAG OUTPUT</div>
            <pre id="flagOutput" class="flag-output">Awaiting retrieval...</pre>
        </section>
    </main>

    <script src="/index.js"></script>
</body>
</html>
