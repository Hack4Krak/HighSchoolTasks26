services:
  smog4shell:
    build: .
    image: smog4shell
    environment:
      DATABASE_URL: postgres://ctf:ctf@db:5432/ctf
      SOLR_NETWORK: bridge
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - db
    network_mode: bridge
    links:
      - db
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=bridge"
      - "traefik.http.routers.smog4shell.rule=Host(`smog4shell.hack4krak.pl`)"
      - "traefik.http.services.smog4shell.loadbalancer.server.port=3000"

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ctf
      POSTGRES_PASSWORD: ctf
      POSTGRES_DB: ctf
    volumes:
      - pgdata:/var/lib/postgresql/data
    network_mode: bridge
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ctf"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:

networks:
  ctf-services-net:
    external: true
    name: bridge
